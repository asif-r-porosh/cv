name: Build CV and Dispatch

on:
  push:
    paths:
      - "README.md"
      - "build.py"
      - "pdf_style.css"
      - "fonts/**"
      - "requirements.txt"
  workflow_dispatch:

jobs:
  build-and-dispatch:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: github.event_name == 'push'
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build CV
        if: github.event_name == 'push'
        run: |
          python build.py

      - name: Validate outputs
        if: github.event_name == 'push'
        run: |
          test -s cv.pdf
          test -s cv_raw_html.html

      - name: Commit generated files (only if changed)
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add cv.pdf cv_raw_html.html

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update generated CV [skip ci]"
            git push
          fi

      - name: Dispatch to r2
        env:
          TOKEN: ${{ secrets.CV_DISPATCH_TOKEN }}
        run: |
          curl -X POST https://api.github.com/repos/asif-r-porosh/uraal.online/dispatches \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d '{
              "event_type": "cv_updated",
              "client_payload": {
                "repo": "asif-r-porosh/cv",
                "branch": "main",
                "commit_sha": "'"${{ github.sha }}"'"
              }
            }'
